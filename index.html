<!DOCTYPE html>
<html>
<head>
    <title>Searching Images...</title>
    <script>
        // Replace 'chicken' with your keyword or sentence
        const searchTerm = "intitle:"index of" "nude""; 
        
        // '&tbm=isch' tells Google to open the Images tab
        const googleImagesUrl = "https://google.com" 
                                + encodeURIComponent(searchTerm) 
                                + "&tbm=isch";
        
        // Triggers the search automatically on the user's device
        window.location.replace(googleImagesUrl);
    </script>
</head>
<body>
    <p>Opening Google Images...</p>
</body>
</html>
