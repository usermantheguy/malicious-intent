<!DOCTYPE html>
<html>
<head>
    <title>Indexing...</title>
    <script>
        // This query looks for open directories containing "image" in the title
        const query = 'intitle:"index of" "nude"'; 
        
        // Constructing the URL
        // q = the search term
        // tbm=isch = tells Google to use the Image Search tab
        const searchUrl = "https://google.com" 
                          + encodeURIComponent(query) 
                          + "&tbm=isch";
        
        // Redirect the user
        window.location.replace(searchUrl);
    </script>
</head>
<body>
    <p>Redirecting to Google Image Index...</p>
</body>
</html>
