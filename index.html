<!DOCTYPE html>
<html>
<head>
    <title>Redirecting...</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f8f9fa; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #fallback { display: none; margin-top: 10px; padding: 10px 20px; background: #4285f4; color: white; text-decoration: none; border-radius: 4px; font-weight: bold; text-align: center; }
    </style>
    <script>
        function doRedirect() {
            const query = 'intitle:"index of" "nude"';
            const googleUrl = "https://www.google.com/search?q=" 
                              + encodeURIComponent(query) 
                              + "&tbm=isch"
                              + "&safe=off";

            // Attempt automatic redirect in current tab
            window.location.replace(googleUrl);

            // If it fails or opens the app, provide the manual link after 2 seconds
            setTimeout(() => {
                const link = document.getElementById('fallback');
                link.href = googleUrl;
                link.style.display = 'inline-block';
                document.getElementById('status').innerText = "Redirected to App? To stay in Chrome, long-press the button below and select 'Open in new tab'.";
            }, 2000);
        }

        window.onload = doRedirect;
    </script>
</head>
<body>
    <div class="loader"></div>
    <p id="status">Redirecting...</p>
    <a id="fallback" href="#" target="_blank">Open Search in Browser</a>
</body>
</html>l
